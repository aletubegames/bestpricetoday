name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'

jobs:
  deploy-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push backend to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "aletubegames@gmail.com"
          git config --global user.name "AleBot"

          # Clona o Space HF
          git clone https://alessandro2090:${HF_TOKEN}@huggingface.co/spaces/alessandro2090/bestpricetoday-api hf_space

          # Sincroniza app/ do backend para o Space
          rsync -av --delete \
            --exclude="__pycache__" \
            --exclude="*.pyc" \
            --exclude="venv/" \
            --exclude=".venv*" \
            backend/app/ hf_space/app/

          # Copia outros arquivos relevantes
          cp backend/hf_deploy/Dockerfile hf_space/Dockerfile
          cp backend/hf_deploy/requirements.txt hf_space/requirements.txt
          cp backend/hf_deploy/README.md hf_space/README.md

          cd hf_space
          git add -A

          if git diff --cached --quiet; then
            echo "Nenhuma mudança no backend, pulando deploy HF"
          else
            git commit -m "deploy: sync from GitHub $(git -C .. rev-parse --short HEAD)"
            git push origin main
            echo "✅ Deploy HF concluído"
          fi
