services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  telegram_bot:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    command: python -m app.workers.telegram_bot

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bestprice
      POSTGRES_PASSWORD: bestprice
      POSTGRES_DB: bestpricetoday
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
